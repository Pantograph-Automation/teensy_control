; [platformio]
; default_envs = native

[env:native]
platform = native
lib_deps =
  google/googletest@^1.12.1
build_src_filter =
    +<*>
    -<main.cpp>
test_framework = googletest
test_filter = *

[env:teensy40]
platform = teensy
board = teensy40
framework = arduino
upload_protocol = teensy-cli
build_src_filter =
    +<*>
    -<test_main.cpp>
monitor_speed = 11520
lib_deps = 
    AS5600