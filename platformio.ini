[platformio]
default_envs = native

[env:native]
platform = native
test_framework = googletest
lib_deps =
  google/googletest@^1.12.1
build_type = debug
build_flags =
    -g
    -O0
    -pthread


[env:teensy40]
platform = teensy
board = teensy40
framework = arduino
upload_protocol = teensy-cli
monitor_speed = 115200
monitor_filters = send_on_enter
lib_deps =
    AS5600